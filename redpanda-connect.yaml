input:
  kafka:
    addresses:
      - localhost:9092
    topics:
      - tactical-events
    consumer_group: "strangler-fig-bridge-group"

pipeline:
  processors: []

output:
  broker:
    pattern: fan_out
    outputs:
      # Destination 1: HQ Redpanda (DDIL Resilience)
      - kafka:
          addresses:
            - hq-redpanda.yourdomain.com:9092
          topic: global-tactical-events
          max_retries: 0  # Infinite retries for DDIL resilience

      # Destination 2: Legacy RabbitMQ (The Strangler Fig Pattern)
      - amqp_0_9:
          urls:
            - amqp://guest:guest@localhost:5672/
          exchange: legacy_sensor_exchange
          exchange_type: topic
          key: sensor.tactical.alert
