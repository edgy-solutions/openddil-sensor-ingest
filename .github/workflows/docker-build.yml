name: Docker Build

on:
  push:
    branches: [ "master" ]
    # Tag pushes (v1.0.0, ...) publish a versioned image (:v1.0.0)
    # alongside :latest so consumers can pin to a release.
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # Publishes ghcr.io/edgy-solutions/openddil/sensor-ingest:latest, which is
  # what openddil-demo/docker-compose.yml references for the DIS sidecar.
  # The image bakes only dis_ingestor.py; customer-encumbered sidecars
  # (proprietary HTTP, etc.) live in the customer overlay and bind-mount
  # their code into a container that reuses this image at runtime.
  build-sensor-ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Always publish :latest. On a v* tag push, ALSO publish the
      # tag-versioned image so consumers can pin to a release.
      - name: Compute image tags
        id: tags
        run: |
          REG=ghcr.io/${{ github.repository_owner }}/openddil/sensor-ingest
          T="$REG:latest"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            T="$T,$REG:${{ github.ref_name }}"
          fi
          echo "tags=$T" >> "$GITHUB_OUTPUT"

      - name: Build sensor-ingest
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
