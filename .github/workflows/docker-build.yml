name: Docker Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read
  packages: write

jobs:
  # Publishes ghcr.io/edgy-solutions/openddil/sensor-ingest:latest, which is
  # what openddil-demo/docker-compose.yml references for the DIS sidecar.
  # The image bakes only dis_ingestor.py; customer-encumbered sidecars
  # (proprietary HTTP, etc.) live in the customer overlay and bind-mount
  # their code into a container that reuses this image at runtime.
  build-sensor-ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build sensor-ingest
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/openddil/sensor-ingest:latest
